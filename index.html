<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff0050" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" href="https://adventure-8t03kq.fly.dev/img/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Creator Still</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').then(function(reg) {
            console.log('Service Worker registrado correctamente:', reg.scope);
            
            // Proactively request notification permission on first mount to support background fallback
            if ('Notification' in window && Notification.permission === 'default') {
              Notification.requestPermission().then(function(permission) {
                console.log('Permiso de notificaciones:', permission);
              });
            }
          }).catch(function(err) {
            console.error('Fallo al registrar Service Worker:', err);
          });
        });
      }
    </script>
  </body>
</html>
